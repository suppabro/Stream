<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Sinhala Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .radio-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: #e94560;
        }

        p.subtitle {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 40px;
        }

        /* Radio Visualizer Animation */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            height: 60px;
            margin-bottom: 40px;
        }

        .bar {
            width: 8px;
            background: #e94560;
            border-radius: 5px;
            animation: bounce 0.5s ease-in-out infinite alternate;
            animation-play-state: paused; /* මුලින් නතර කරලා තියෙන්නේ */
        }

        /* එක එක Bar එක එක එක වෙලාවට උඩ පනින්න Delay එකක් දෙනවා */
        .bar:nth-child(1) { height: 20px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 40px; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 60px; animation-delay: 0s; }
        .bar:nth-child(4) { height: 40px; animation-delay: 0.2s; }
        .bar:nth-child(5) { height: 20px; animation-delay: 0.4s; }

        @keyframes bounce {
            0% { transform: scaleY(0.5); opacity: 0.5; }
            100% { transform: scaleY(1.5); opacity: 1; }
        }

        /* Play Button */
        .play-btn {
            background: #e94560;
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #ff5277;
        }

        /* Volume Control */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .volume-icon { font-size: 18px; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 150px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        /* Hidden YouTube Player */
        #yt-player-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 10px;
            height: 10px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="radio-card">
        <h1>24/7 RADIO</h1>
        <p class="subtitle">Sinhala Nonstop Hits</p>

        <!-- Radio Animation -->
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>

        <div class="volume-container">
            <span class="volume-icon">🔉</span>
            <input type="range" id="volume-slider" min="0" max="100" value="70" oninput="changeVolume(this.value)">
            <span class="volume-icon">🔊</span>
        </div>
    </div>

    <!-- Hidden Player -->
    <div id="yt-player-container">
        <div id="youtube-player"></div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const playBtn = document.getElementById('play-btn');
        const visualizerBars = document.querySelectorAll('.bar');
        const volumeSlider = document.getElementById('volume-slider');

        let ytPlayer;
        let isPlaying = false;
        let isPlayerReady = false;

        // දැන් ID හොයන්න ඕන නෑ, කෙලින්ම සම්පූර්ණ ලින්ක් එක දාන්න!
        const songLinks = [
            "https://music.youtube.com/watch?v=FuZox51gFdU", // ඔයාගේ පළවෙනි සින්දුව
            // තව සින්දු වල ලින්ක් මේ විදියට පල්ලෙහායින් කමාවක් දාලා එකතු කරන්න
            // "https://www.youtube.com/watch?v=...",
        ];

        // ලින්ක් එකෙන් ID එක ඉබේම ගලවන මැජික් එක
        const radioPlaylist = songLinks.map(link => {
            if(link.includes('v=')) return link.split('v=')[1].split('&')[0];
            if(link.includes('youtu.be/')) return link.split('youtu.be/')[1].split('?')[0];
            return link; // නිකන්ම ID එක දැම්මත් වැඩ කරනවා
        });

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '10', width: '10',
                playerVars: { 
                    'controls': 0, 
                    'showinfo': 0,
                    'playsinline': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
            ytPlayer.setVolume(volumeSlider.value);
            
            ytPlayer.cuePlaylist(radioPlaylist);
            ytPlayer.setLoop(true);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.innerText = '⏸';
                visualizerBars.forEach(bar => bar.style.animationPlayState = 'running');
            } 
            else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                isPlaying = false;
                playBtn.innerText = '▶';
                visualizerBars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        function togglePlay() {
            if (!isPlayerReady) {
                alert("Player is loading... Please wait a second.");
                return;
            }
            if (isPlaying) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }

        function changeVolume(value) {
            if (isPlayerReady) {
                ytPlayer.setVolume(value);
            }
        }
    </script>

    </body>
</html>
